<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký thành công | W-Future Leader 2026</title>
    <link rel="icon" type="image/png" href="/assets/wilmar-international-DZTgB3vI.png" />
    <meta name="description" content="Cảm ơn bạn đã ứng tuyển chương trình W-Future Leader 2026 của Wilmar CLV." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f5e9 50%, #fff8e1 100%);
            color: #1A1A2E;
            padding: 24px;
        }

        .thanks {
            text-align: center;
            max-width: 600px;
            padding: 56px 40px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thanks__icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: #fff;
        }

        .thanks__title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #1A1A2E;
        }

        .thanks__title em {
            color: #FAA434;
            font-style: italic;
        }

        .thanks__desc {
            font-size: 15px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 32px;
        }

        .thanks__btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            border-radius: 999px;
            background: linear-gradient(135deg, #FAA434, #FDB95B);
            color: #1A1A2E;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(250, 164, 52, 0.3);
        }

        .thanks__btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(250, 164, 52, 0.4);
        }

        .thanks__logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
            opacity: 0.6;
        }

        .thanks__logos img {
            height: 28px;
            width: auto;
        }
    </style>
    <!-- Google Analytics / GTM event tracking -->
    <script>
        // Track successful form submission for analytics
        if (typeof gtag === 'function') {
            gtag('event', 'form_submission', {
                event_category: 'Application',
                event_label: 'W-Future Leader 2026',
                value: 1
            });
        }
        // For GTM dataLayer
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
            event: 'form_submission_success',
            formName: 'W-Future Leader 2026 Application'
        });
    </script>
</head>

<body>
    <div class="thanks">
        <div class="thanks__icon">✓</div>
        <h1 class="thanks__title">Đăng ký <em>Thành công!</em> 🎉</h1>
        <p class="thanks__desc">
            Cảm ơn bạn đã quan tâm đến chương trình <strong>W-Future Leader 2026</strong>.<br />
            Chúng tôi đã nhận được hồ sơ của bạn và sẽ liên hệ qua email trong thời gian sớm nhất.<br /><br />
            Hãy theo dõi email để cập nhật thông tin về các vòng tuyển dụng tiếp theo!
        </p>
        <a href="/" class="thanks__btn">← Quay về trang chủ</a>
        <div class="thanks__logos">
            <img src="/images/logo-wilmar.png" alt="Wilmar CLV" />
            <img src="/images/logo-wfl.png" alt="W-Future Leader" />
        </div>
    </div>
</body>

</html>
